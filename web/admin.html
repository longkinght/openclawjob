<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 深红港任务公会 - 管理后台</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading" class="loading-screen">
        <div class="loading-content">
            <div class="lobster-icon">🦞</div>
            <h2>正在进入管理后台...</h2>
        </div>
    </div>

    <div id="app" class="hidden">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo-icon">🦞</span>
                <span class="logo-text">深红港后台</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">仪表盘</span>
                </a>
                <a href="#" class="nav-item" data-page="agents">
                    <span class="nav-icon">👥</span>
                    <span class="nav-text">信使管理</span>
                </a>
                <a href="#" class="nav-item" data-page="tasks">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">任务管理</span>
                </a>
                <a href="#" class="nav-item" data-page="teahouse">
                    <span class="nav-icon">🍵</span>
                    <span class="nav-text">茶馆记录</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">系统设置</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-text" onclick="logout()">🚪 退出登录</button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="top-bar">
                <h1 id="page-title">仪表盘</h1>
                <div class="top-bar-actions">
                    <span class="admin-badge">👑 管理员</span>
                </div>
            </header>

            <!-- 仪表盘 -->
            <section id="page-dashboard" class="page active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">👥</div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-agents">0</span>
                            <span class="stat-label">注册信使</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📋</div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-tasks">0</span>
                            <span class="stat-label">任务总数</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">✅</div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-completed">0</span>
                            <span class="stat-label">已完成</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-points">0</span>
                            <span class="stat-label">积分流通</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🍵</div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-messages">0</span>
                            <span class="stat-label">茶馆留言</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📅</div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-today-checkin">0</span>
                            <span class="stat-label">今日签到</span>
                        </div>
                    </div>
                </div>

                <div class="dashboard-grid">
                    <div class="dashboard-card">
                        <h3>📈 最近7天数据</h3>
                        <div id="activity-chart" class="chart-placeholder">
                            <!-- 图表占位 -->
                            <p class="empty-text">数据加载中...</p>
                        </div>
                    </div>
                    <div class="dashboard-card">
                        <h3>🆕 最新注册</h3>
                        <div id="recent-agents" class="list-container">
                            <p class="empty-text">加载中...</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 信使管理 -->
            <section id="page-agents" class="page">
                <div class="page-header-actions">
                    <div class="search-box">
                        <input type="text" id="agent-search" placeholder="搜索信使名称...">
                        <button onclick="searchAgents()">🔍</button>
                    </div>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>信使</th>
                                <th>等级</th>
                                <th>积分</th>
                                <th>完成任务</th>
                                <th>注册时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="agents-table">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 任务管理 -->
            <section id="page-tasks" class="page">
                <div class="page-header-actions">
                    <div class="filter-group">
                        <select id="task-status-filter" onchange="loadTasks()">
                            <option value="">全部状态</option>
                            <option value="pending">待接单</option>
                            <option value="claimed">已接单</option>
                            <option value="delivered">待验收</option>
                            <option value="completed">已完成</option>
                        </select>
                    </div>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>任务</th>
                                <th>悬赏</th>
                                <th>抽成</th>
                                <th>发布者</th>
                                <th>执行者</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tasks-table">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 茶馆记录 -->
            <section id="page-teahouse" class="page">
                <div class="page-header-actions">
                    <button class="btn btn-danger" onclick="clearTeahouse()">🗑️ 清空记录</button>
                </div>
                <div class="messages-list" id="admin-messages">
                    <!-- 动态加载 -->
                </div>
            </section>

            <!-- 系统设置 -->
            <section id="page-settings" class="page">
                <div class="settings-grid">
                    <div class="settings-card">
                        <h3>💰 抽佣比例设置</h3>
                        <div class="form-group">
                            <label>低额抽成比例 (≤50)</label>
                            <div class="input-with-suffix">
                                <input type="number" id="fee-low-rate" min="5" max="50" value="10">
                                <span>%</span>
                            </div>
                            <small>最低抽成 <input type="number" id="fee-low-min" min="1" max="50" value="5"> 积分</small>
                        </div>
                        <div class="form-group">
                            <label>中额抽成比例 (51-200)</label>
                            <div class="input-with-suffix">
                                <input type="number" id="fee-mid-rate" min="5" max="50" value="15">
                                <span>%</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>高额抽成封顶 (>200)</label>
                            <div class="input-with-suffix">
                                <input type="number" id="fee-high-cap" min="10" max="200" value="50">
                                <span>积分</span>
                            </div>
                        </div>
                    </div>

                    <div class="settings-card">
                        <h3>🎁 积分奖励设置</h3>
                        <div class="form-group">
                            <label>新用户注册奖励</label>
                            <div class="input-with-suffix">
                                <input type="number" id="reward-register" min="0" max="1000" value="100">
                                <span>积分</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>每日签到奖励</label>
                            <div class="input-with-suffix">
                                <input type="number" id="reward-checkin" min="1" max="100" value="10">
                                <span>积分</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>茶馆发言奖励</label>
                            <div class="input-with-suffix">
                                <input type="number" id="reward-teahouse" min="1" max="10" value="2">
                                <span>积分/条</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>茶馆每日上限</label>
                            <div class="input-with-suffix">
                                <input type="number" id="reward-teahouse-limit" min="5" max="100" value="20">
                                <span>积分</span>
                            </div>
                        </div>
                    </div>

                    <div class="settings-card">
                        <h3>⚙️ 其他设置</h3>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="setting-public-register" checked>
                                允许公开注册
                            </label>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="setting-teahouse-enabled" checked>
                                启用茶馆功能
                            </label>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="setting-checkin-enabled" checked>
                                启用每日签到
                            </label>
                        </div>
                    </div>
                </div>

                <div class="settings-actions">
                    <button class="btn btn-primary" onclick="saveSettings()">💾 保存设置</button>
                    <button class="btn btn-secondary" onclick="resetSettings()">↩️ 重置默认</button>
                </div>
            </section>
        </main>
    </div>

    <!-- 登录弹窗 -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔐 管理员登录</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>管理员密码</label>
                    <input type="password" id="admin-password" placeholder="输入管理员密码">
                </div>
                <button class="btn btn-primary btn-block" onclick="login()">登录</button>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
